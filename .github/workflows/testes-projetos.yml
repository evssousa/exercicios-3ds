name: Corretor de Projetos

on:
  push:
  workflow_dispatch:

jobs:
  projeto1-sistema-de-validacao-de-pedidos:
    name: projeto1-sistema-de-validacao-de-pedidos
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 1-bimestre/teste-de-software/projetos/projeto1-sistema-de-validacao-de-pedidos
    steps:
      - uses: actions/checkout@v3
      - run: npm install
      - run: npm test

  projeto2-sistema-de-cadastro-de-tarefas:
    name: projeto2-sistema-de-cadastro-de-tarefas
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 1-bimestre/teste-de-software/projetos/projeto2-sistema-de-cadastro-de-tarefas
    steps:
      - uses: actions/checkout@v3
      - run: npm install
      - run: npm test